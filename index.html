<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000">
<title>CricTracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── Reset & root ── */
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
:root{
  --red:#FF3B30;--orange:#FF9500;--yellow:#FFD60A;--green:#30D158;--teal:#5AC8FA;--blue:#0A84FF;--indigo:#5E5CE6;
  --bg:#000;--bg1:#1C1C1E;--bg2:#2C2C2E;--bg3:#3A3A3C;
  --sep:rgba(84,84,88,.65);--t2:rgba(235,235,245,.6);--t3:rgba(235,235,245,.3);
  --glass:rgba(28,28,30,.92);
  --ease:cubic-bezier(.16,1,.3,1);--spring:cubic-bezier(.34,1.4,.64,1);
  --sidebar-w:220px;
}
html{background:#000;font-family:'Inter',-apple-system,sans-serif;color:#fff;-webkit-font-smoothing:antialiased}
body{background:#000;font-family:'Inter',-apple-system,sans-serif;color:#fff;-webkit-font-smoothing:antialiased}
input,select,button,textarea{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}

/* ── Keyframe animations ── */
@keyframes fadeIn   {from{opacity:0}to{opacity:1}}
@keyframes riseUp   {from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
@keyframes popIn    {from{opacity:0;transform:scale(.75)}to{opacity:1;transform:scale(1)}}
@keyframes sheetIn  {from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes zoomIn   {from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
@keyframes spin     {from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes pulse    {0%,100%{opacity:1}50%{opacity:.25}}
@keyframes breathe  {0%,100%{transform:scale(1)}50%{transform:scale(1.09)}}
@keyframes fabIn    {from{opacity:0;transform:scale(.5) translateY(20px)}to{opacity:1;transform:none}}
@keyframes fadeOut  {0%{opacity:1;pointer-events:auto}90%{opacity:1}100%{opacity:0;pointer-events:none}}
.a-rise {animation:riseUp .4s var(--ease) both}
.a-pop  {animation:popIn  .35s var(--spring) both}
.a-sheet{animation:sheetIn .42s var(--spring) both}
.a-zoom {animation:zoomIn  .4s var(--spring) both}
.a-fade {animation:fadeIn  .22s ease both}
.spin   {animation:spin 1s linear infinite}
.d1{animation-delay:.06s}.d2{animation-delay:.12s}.d3{animation-delay:.18s}.d4{animation-delay:.24s}.d5{animation-delay:.3s}

/* ═══════════════════════════════════════════
   MOBILE LAYOUT (default, < 768 px)
═══════════════════════════════════════════ */
#root{
  display:flex;
  justify-content:center;
  background:#000;
  min-height:100dvh;
}
/* Desktop bg unified with shell */
@media(min-width:1024px){
  #root{background:#0a0a0a}
  body{background:#0a0a0a}
}
.shell{
  width:100%;
  max-width:480px;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  position:relative;
  background:#000;
}
.scr{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding-bottom:96px;
}

/* bottom tabbar — mobile */
.tabbar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;z-index:50;
  background:var(--glass);backdrop-filter:saturate(180%) blur(24px);-webkit-backdrop-filter:saturate(180%) blur(24px);
  border-top:1px solid var(--sep);
  padding:6px 0 calc(8px + env(safe-area-inset-bottom));
  display:flex;justify-content:space-around;align-items:flex-end;
}
.tb{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 12px;transition:transform .1s}
.tb:active{transform:scale(.88)}
.tb-l{font-size:10px;font-weight:600}
.fab-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;margin-top:-20px;padding:0 8px}
.fab{width:54px;height:54px;border-radius:27px;display:flex;align-items:center;justify-content:center;transition:transform .12s}
.fab:active{transform:scale(.88)}

/* cards */
.card{background:var(--bg1);border-radius:18px;overflow:hidden}
.row{display:flex;align-items:center;padding:14px 16px;gap:12px;border:none;background:none;width:100%;text-align:left;color:#fff;cursor:pointer;transition:background .1s}
.row:active{background:rgba(255,255,255,.05)}
.row+.row{border-top:1px solid var(--sep)}

/* inputs */
.inp{width:100%;background:var(--bg2);border:none;border-radius:12px;padding:13px 16px;color:#fff;font-size:15px;font-weight:500;outline:none;transition:box-shadow .18s;-webkit-appearance:none;appearance:none}
.inp::placeholder{color:var(--t3)}
.inp:focus{box-shadow:0 0 0 3px rgba(10,132,255,.35)}
.inp option{background:#1c1c1e}
.inp[type=date]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.5;cursor:pointer}
.field{margin-bottom:14px}
.flbl{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t2);display:block;margin-bottom:6px}

/* buttons */
.btn{width:100%;height:52px;border-radius:14px;border:none;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .1s,opacity .1s}
.btn:active:not(:disabled){transform:scale(.96);opacity:.84}
.btn:disabled{opacity:.36;cursor:not-allowed}
.b-blue  {background:var(--blue);color:#fff}
.b-red   {background:var(--red);color:#fff}
.b-gold  {background:linear-gradient(135deg,#FFD60A,#FF9500);color:#000}
.b-green {background:var(--green);color:#000}
.b-ghost {background:var(--bg2);color:#fff}
.b-indigo{background:var(--indigo);color:#fff}

/* segments */
.seg{display:flex;background:rgba(118,118,128,.2);border-radius:10px;padding:2px;margin-bottom:16px}
.seg-b{flex:1;padding:8px 4px;border:none;background:transparent;border-radius:8px;font-size:13px;font-weight:600;color:var(--t2);cursor:pointer;transition:all .15s}
.seg-b.on{background:var(--bg1);color:#fff;box-shadow:0 1px 8px rgba(0,0,0,.5)}

/* live badge */
.lbadge{display:inline-flex;align-items:center;gap:5px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.12);padding:4px 10px;border-radius:100px;font-size:11px;font-weight:700;letter-spacing:.04em}
.ldot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.4s ease-in-out infinite;box-shadow:0 0 6px var(--green)}

/* overlays */
.overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.72);backdrop-filter:blur(12px);display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
.overlay-center{position:fixed;inset:0;z-index:110;background:rgba(0,0,0,.82);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .22s ease}
.panel{width:100%;max-width:480px;background:var(--bg1);border-radius:22px 22px 0 0;max-height:90vh;overflow-y:auto}
.popup{width:100%;max-width:380px;background:var(--bg1);border-radius:24px;padding:28px 24px;text-align:center}
.s-grab-wrap{display:flex;justify-content:center;padding:10px 0 6px}
.s-grab{width:36px;height:4px;border-radius:2px;background:var(--bg3)}
.s-head{display:flex;justify-content:space-between;align-items:center;padding:4px 16px 14px;border-bottom:1px solid var(--sep)}
.s-body{padding:16px}
.s-close{width:28px;height:28px;border-radius:14px;background:var(--bg3);border:none;color:var(--t2);display:flex;align-items:center;justify-content:center;cursor:pointer}

/* type labels */
.lbl{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t2)}
.cap{font-size:13px;color:var(--t2)}
.mono{font-variant-numeric:tabular-nums}

/* misc */
.hscroll{overflow-x:auto;display:flex;gap:12px;padding-bottom:2px;scrollbar-width:none}
.hscroll::-webkit-scrollbar{display:none}
.banner{margin:0 20px 14px;border-radius:14px;padding:12px 14px;font-size:13px;display:flex;align-items:flex-start;gap:10px;animation:riseUp .3s var(--ease)}
.off-bar{padding:8px 16px;text-align:center;font-size:12px;font-weight:700;color:var(--red);background:rgba(255,59,48,.1);border-bottom:1px solid rgba(255,59,48,.2)}

/* run grid */
.rgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.rbtn{height:68px;border-radius:16px;border:none;cursor:pointer;font-size:32px;font-weight:900;color:#fff;transition:transform .09s,opacity .09s}
.rbtn:active{transform:scale(.87);opacity:.75}

/* badges */
.so-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:100px;background:linear-gradient(135deg,rgba(94,92,230,.3),rgba(10,132,255,.3));border:1px solid rgba(94,92,230,.5);font-size:12px;font-weight:700;color:#a0a0ff}
.type-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:700}
svg{display:inline-block;vertical-align:middle;flex-shrink:0}

/* watch player */
.watch-player-wrap{position:relative;width:100%;padding-top:56.25%;background:#000;border-radius:14px;overflow:hidden}
.watch-player-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}

/* ── Floating Watch button ── */
.watch-fab{
  position:fixed;
  bottom:calc(80px + env(safe-area-inset-bottom));
  right:14px;
  z-index:45;
  display:flex;align-items:center;gap:7px;
  padding:9px 14px 9px 10px;
  border-radius:100px;border:none;cursor:pointer;
  font-family:inherit;font-size:12px;font-weight:800;letter-spacing:.02em;color:#fff;
  background:linear-gradient(135deg,#FF3B30,#FF6B6B);
  box-shadow:0 4px 18px rgba(255,59,48,.42),0 1px 3px rgba(0,0,0,.3);
  transition:transform .15s var(--spring),box-shadow .15s;
  -webkit-tap-highlight-color:transparent;
  animation:fabIn .4s var(--spring) both;
}
.watch-fab:active{transform:scale(.92)}
.watch-fab-dot{width:7px;height:7px;border-radius:50%;background:#fff;animation:pulse 1.5s ease-in-out infinite;flex-shrink:0}

/* ═══════════════════════════════════════════
   TABLET (≥ 600 px)
═══════════════════════════════════════════ */
/* Splash desktop/mobile toggle — JS sets display but provide CSS backup */
@media(min-width:1024px){
  #splash-mobile{display:none!important}
  #splash-desktop{display:block!important}
}
@media(max-width:1023px){
  #splash-desktop{display:none!important}
  #splash-mobile{display:flex!important}
}
@media(min-width:600px){
  .shell{max-width:560px}
  .tabbar{max-width:560px}
  .btn{height:54px}
  .card{border-radius:20px}
  .popup{max-width:460px}
  .panel{max-width:560px}
  .rbtn{height:74px;font-size:34px}
}

/* ═══════════════════════════════════════════
   DESKTOP (≥ 1024 px)
   Sidebar nav replaces bottom tabbar.
   Content fills right of sidebar.
═══════════════════════════════════════════ */
@media(min-width:1024px){

  /* Full page scroll */
  html,body{height:auto;min-height:100vh}

  /* Root: sidebar + main side-by-side */
  #root{
    display:flex;
    flex-direction:row;
    align-items:stretch;
    min-height:100vh;
    justify-content:flex-start;
    background:#0a0a0a;
  }

  /* ── Sidebar ── */
  #dt-sidebar{
    position:fixed;top:0;left:0;
    width:var(--sidebar-w);height:100vh;
    background:var(--bg1);
    border-right:1px solid var(--sep);
    display:flex;flex-direction:column;
    z-index:60;overflow:hidden;
    flex-shrink:0;
  }
  #dt-sidebar-logo{
    padding:22px 18px 18px;
    border-bottom:1px solid var(--sep);
    display:flex;align-items:center;gap:12px;
  }
  #dt-sidebar-nav{
    flex:1;padding:10px 8px;
    display:flex;flex-direction:column;gap:2px;
    overflow-y:auto;scrollbar-width:none;
  }
  #dt-sidebar-nav::-webkit-scrollbar{display:none}
  .dt-nav-btn{
    display:flex;align-items:center;gap:11px;
    padding:10px 12px;border-radius:11px;
    border:none;background:transparent;
    color:var(--t2);font-size:14px;font-weight:600;
    cursor:pointer;text-align:left;width:100%;
    transition:background .12s,color .12s;
  }
  .dt-nav-btn:hover{background:var(--bg2);color:#fff}
  .dt-nav-btn.active{background:rgba(10,132,255,.14);color:var(--blue)}
  #dt-sidebar-bottom{padding:12px 8px;border-top:1px solid var(--sep)}
  .dt-status-pill{
    display:flex;align-items:center;gap:8px;
    padding:9px 12px;border-radius:10px;
    background:var(--bg2);
    font-size:12px;font-weight:600;color:var(--t2);
  }

  /* ── Shell (main area) ── */
  .shell{
    flex:1;
    max-width:100%;
    width:100%;
    min-height:100vh;
    height:auto;
    margin-left:var(--sidebar-w);
    background:#0a0a0a;
    /* Prevents white flash from parent bg */
    box-shadow:none;
  }

  /* Content scroll */
  .scr{
    overflow-y:auto;
    overflow-x:hidden;
    padding-bottom:60px;
    height:auto;
    min-height:0;
  }

  /* Hide mobile nav */
  .tabbar{display:none!important}

  /* Watch FAB repositioned */
  .watch-fab{
    bottom:20px;right:20px;
    left:auto;transform:none;
    font-size:13px;padding:10px 16px 10px 12px;
  }
  .watch-fab:hover{transform:scale(1.05);box-shadow:0 6px 24px rgba(255,59,48,.5)}

  /* Desktop page wrapper */
  .dt-page{max-width:1300px;margin:0 auto;padding:32px 36px 48px}
  .dt-page-header{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:24px;padding-bottom:18px;
    border-bottom:1px solid var(--sep);
  }
  .dt-page-title{font-size:30px;font-weight:900;letter-spacing:-.04em;margin:0}
  .dt-page-sub{font-size:14px;color:var(--t2);margin-top:3px}

  /* Stat grid */
  .dt-home-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}

  /* 3-col scoring dashboard */
  .dt-grid-3{display:grid;grid-template-columns:290px 1fr 270px;gap:18px;align-items:start}
  .dt-col{display:flex;flex-direction:column;gap:14px}
  .dt-scorecard,.dt-keypad,.dt-sidebar-panel{background:var(--bg1);border-radius:20px;padding:20px}

  /* Cards & buttons — hover */
  .card{transition:box-shadow .18s}
  .card:hover{box-shadow:0 4px 22px rgba(0,0,0,.45)}
  .row:hover{background:rgba(255,255,255,.06)!important}
  .btn:hover:not(:disabled){filter:brightness(1.08)}
  .b-blue:hover{box-shadow:0 4px 20px rgba(10,132,255,.38)}
  .b-red:hover{box-shadow:0 4px 20px rgba(255,59,48,.38)}

  /* Bigger run buttons */
  .rbtn{height:82px;font-size:38px;border-radius:18px}
  .rbtn:hover{filter:brightness(1.15);transform:scale(1.02)}

  /* Modals → centered */
  .overlay{align-items:center}
  .panel{border-radius:22px;max-width:540px}
  .s-grab-wrap{display:none}

  /* Focus mode */
  .dt-focus .dt-col-left,
  .dt-focus .dt-col-right{display:none}
  .dt-focus .dt-grid-3{grid-template-columns:1fr;max-width:660px;margin:0 auto}
  .dt-focus-toggle{
    position:fixed;top:16px;right:16px;z-index:65;
    display:flex;align-items:center;gap:6px;
    padding:7px 14px;border-radius:100px;
    border:1px solid var(--sep);background:var(--bg1);
    color:var(--t2);font-size:12px;font-weight:700;cursor:pointer;
    transition:all .15s;
  }
  .dt-focus-toggle:hover{background:var(--bg2);color:#fff}

  /* Reports 2-col */
  .dt-rep-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}

  /* Type labels bigger */
  .lbl{font-size:12px}
  .cap{font-size:14px}
}

/* ═══════════════════════════════════════════
   WIDE DESKTOP (≥ 1280 px)
═══════════════════════════════════════════ */
@media(min-width:1280px){
  :root{--sidebar-w:240px}
  .dt-page{padding:32px 40px 48px}
  .dt-grid-3{grid-template-columns:310px 1fr 290px;gap:22px}
}

/* ═══════════════════════════════════════════
   EXTRA LARGE (≥ 1440 px)
═══════════════════════════════════════════ */
@media(min-width:1440px){
  .dt-page{max-width:1440px;padding:36px 48px 56px}
  .dt-grid-3{grid-template-columns:340px 1fr 310px;gap:24px}
}

/* Splash panel visibility */
.splash-mobile-panel{display:flex!important;flex-direction:column}
.splash-desktop-panel{display:none!important}
@media(min-width:1024px){
  .splash-mobile-panel{display:none!important}
  .splash-desktop-panel{display:flex!important}
}

</style>

</head>
<body>
<div id="root"></div>
<script>

// CONFIG
// ═══════════════════════════════════════════════════

function parseSheet(text){
  if(!text||!text.trim()) throw new Error('Empty');
  const t=text.trim();
  if(t.startsWith('<')) throw new Error('Got HTML — check GAS deployment settings');
  const data=JSON.parse(t);
  if(!Array.isArray(data)) throw new Error('Not array');
  if(!data.length) return [];
  if(Array.isArray(data[0])){
    const[hdrs,...rows]=data;
    const ci=(k)=>hdrs.findIndex(h=>String(h).toLowerCase().includes(k.toLowerCase()));
    const idx={ts:ci('timestamp'),player:ci('player'),team:ci('team'),session:ci('session'),
      speed:ci('speed'),runs:ci('runs'),balls:ci('balls'),overs:ci('overs'),
      wickets:ci('wicket'),sr:ci('strike'),eco:ci('economy')};
    return rows.filter(r=>r.some(c=>c!=='')).map(r=>({
      timestamp:r[idx.ts]||'',player:r[idx.player]||'',team:r[idx.team]||'',
      session:r[idx.session]||'',speed:r[idx.speed]||'',runs:r[idx.runs]||'',
      balls:r[idx.balls]||'',overs:r[idx.overs]||'',wickets:r[idx.wickets]||'',
      strikeRate:r[idx.sr]||'',economy:r[idx.eco]||''
    }));
  }
  return data.map(r=>({
    timestamp:r.timestamp||r.Timestamp||'',player:r.player||r.Player||'',
    team:r.team||r.Team||'',session:r.session||r.Session||'',
    speed:r.speed||r.Speed_kmh||r.Speed||'',runs:r.runs||r.Runs||'',
    balls:r.balls||r.Balls||'',overs:r.overs||r.Overs||'',
    wickets:r.wickets||r.Wickets||'',strikeRate:r.strikeRate||r.StrikeRate||'',
    economy:r.economy||r.Economy||''
  }));
}
async function tier1_get(){
  const ac=new AbortController(),tm=setTimeout(()=>ac.abort(),7000);
  try{
    const r=await fetch(GAS+'?action=read&t='+Date.now(),{method:'GET',signal:ac.signal,mode:'cors',cache:'no-cache',redirect:'follow'});
    clearTimeout(tm);if(!r.ok)throw new Error('HTTP '+r.status);
    return parseSheet(await r.text());
  }finally{clearTimeout(tm);}
}
async function tier2_get(){
  const r=await fetch(ANT,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:16000,
      tools:[{type:'web_search_20250305',name:'web_search'}],
      system:'You are a JSON proxy. Fetch the URL and reply with ONLY the raw JSON, no markdown, starting with [ or {.',
      messages:[{role:'user',content:'Fetch raw JSON from: '+GAS+'?action=read&t='+Date.now()}]})});
  if(!r.ok)throw new Error('ANT HTTP '+r.status);
  const j=await r.json();
  const txt=(j.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
  const m=txt.match(/\[[\s\S]*\]/);
  if(!m)throw new Error('No JSON array in proxy');
  return parseSheet(m[0]);
}
async function fetchData(){
  if(S.loading)return;
  S.loading=true;S.fStatus='fetching';render();
  try{S.rawData=await tier1_get();S.fStatus='ok';S.loading=false;render();return;}catch(e){console.warn('[T1]',e.message);}
  S.fStatus='proxy';render();
  try{S.rawData=await tier2_get();S.fStatus='ok';S.loading=false;render();return;}catch(e){console.warn('[T2]',e.message);}
  S.fStatus='error';S.loading=false;render();
}
async function saveRow(payload){
  try{
    const ac=new AbortController();setTimeout(()=>ac.abort(),7000);
    const r=await fetch(GAS,{method:'POST',signal:ac.signal,mode:'cors',redirect:'follow',
      headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)});
    if(r.ok)return 'direct';
  }catch(e){console.warn('[POST T1]',e.message);}
  try{
    await fetch(ANT,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:100,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        system:'HTTP proxy. POST the JSON body to the URL. Return only: done',
        messages:[{role:'user',content:'POST to '+GAS+' body: '+JSON.stringify(payload)}]})});
    return 'proxy';
  }catch(e){console.warn('[POST T2]',e.message);}
  try{const q=JSON.parse(localStorage.getItem('cq')||'[]');q.push(payload);localStorage.setItem('cq',JSON.stringify(q));}catch(_){}
  return 'queued';
}

function esc(v){const s=String(v??'');return(s.includes(',')||s.includes('"')||s.includes('\n'))?'"'+s.replace(/"/g,'""')+'"':s;}
function dlCSV(rows,fname){
  if(!rows?.length){alert('No data to export');return;}
  const H=['Timestamp','Player','Team','Session','Speed_kmh','Runs','Balls','Overs','Wickets','StrikeRate','Economy'];
  const lines=[H.join(','),...rows.map(r=>[r.timestamp,r.player,r.team,r.session,r.speed,r.runs,r.balls,r.overs,r.wickets,r.strikeRate,r.economy].map(esc).join(','))];
  const blob=new Blob([lines.join('\r\n')],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=Object.assign(document.createElement('a'),{href:url,download:fname});
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),2000);
}
const ov=(b)=>Math.floor(b/6)+'.'+b%6;
const sr=(r,b)=>b?((r/b)*100).toFixed(1):'0.0';
const eco=(r,o)=>o?(r/o).toFixed(2):'0.00';

function buildMatches(){
  const map={};
  S.rawData.forEach(row=>{
    const key=String(row.session||'');if(!key)return;
    if(!map[key])map[key]={rawSession:key,displayName:key.replace(/\s*\(Toss:.*?\)\s*/i,'').trim()||key,toss:null,date:'',type:'',teams:{}};
    if(!map[key].date&&row.timestamp){try{map[key].date=new Date(row.timestamp).toLocaleDateString('en-IN');}catch(_){}}
    const tm=key.match(/Toss:\s*(.+?)\s+chose to\s+(.+?)\)/i);
    if(tm&&!map[key].toss)map[key].toss=tm[1]+' won · elected to '+tm[2];
    const typeM=key.match(/\[(\w+)\]/);
    if(typeM&&!map[key].type)map[key].type=typeM[1];
    const t=String(row.team||'Team');
    if(!map[key].teams[t])map[key].teams[t]={runs:0,wkts:0,balls:0};
    map[key].teams[t].runs+=Number(row.runs)||0;
    map[key].teams[t].wkts+=Number(row.wickets)||0;
    map[key].teams[t].balls+=Number(row.balls)||0;
  });
  return Object.values(map).reverse();
}
function getMatchRows(rawSession){return S.rawData.filter(r=>String(r.session||'')===rawSession);}
function matchResult(m){
  const t=Object.keys(m.teams);
  if(t.length<2)return t.length?'🏏 '+t[0]:'';
  const[a,b]=t,ra=m.teams[a].runs,rb=m.teams[b].runs;
  if(ra>rb)return '🏆 '+a+' won by '+(ra-rb)+' runs';
  if(rb>ra)return '🏆 '+b+' won by '+(rb-ra)+' runs';
  return '🤝 Match Tied';
}

function addUpcoming(){
  var g=function(id){var e=document.getElementById(id);return e?e.value.trim():'';};
  var t1=g('ut1'),t2=g('ut2');
  if(!t1||!t2){alert('Please enter both team names');return;}
  S.upcoming.unshift({id:Date.now(),t1:t1,t2:t2,date:g('udate'),time:g('utime'),venue:g('uvenue'),type:document.getElementById('utype')?.value||'Practice'});
  saveU();S.upcomingSheet=false;render();
}

function delUpcoming(i){
  S.upcoming.splice(i,1);saveU();render();
}

function startFromUpcoming(i){
  var m=S.upcoming[i];
  S.mc=freshMC();
  S.mc.md.t1=m.t1||'Team 1';
  S.mc.md.t2=m.t2||'Team 2';
  S.mc.md.date=m.date||new Date().toISOString().slice(0,10);

/* ── Category helpers ── */
function speedCat(kmh){
  kmh = +kmh;
  if(kmh >= 145) return {l:'Express Fast',  c:'#FF3B30', bg:'rgba(255,59,48,.18)',  e:'🔥'};
  if(kmh >= 135) return {l:'Fast',          c:'#FF6B30', bg:'rgba(255,107,48,.18)', e:'⚡'};
  if(kmh >= 125) return {l:'Fast-Medium',   c:'#FF9500', bg:'rgba(255,149,0,.18)',  e:'💪'};
  if(kmh >= 115) return {l:'Medium-Fast',   c:'#FFD60A', bg:'rgba(255,214,10,.15)', e:'🏃'};
  if(kmh >= 100) return {l:'Medium Pace',   c:'#30D158', bg:'rgba(48,209,88,.15)',  e:'🎯'};
                 return {l:'Slow/Spin',     c:'#5AC8FA', bg:'rgba(90,200,250,.15)', e:'🌀'};
}

function radarHTML(){
  const r = S.radar;
  const cat = r.speed ? speedCat(r.speed) : null;
  const sess = r.session || [];
  const hasSess = sess.length > 0;
  const avgSpd = hasSess ? (sess.reduce((s,x)=>s+Number(x.speed),0)/sess.length).toFixed(1) : null;
  const maxSpd = hasSess ? Math.max(...sess.map(x=>Number(x.speed))).toFixed(1) : null;
  const bowlers = [...new Set(sess.map(x=>x.bowler).filter(Boolean))];

  // Zones visual
  const zones = [
    {id:'Short',    l:'Short / Bouncer', c:'var(--red)',    h:30},
    {id:'Good Length',l:'Good Length',  c:'var(--green)',  h:28},
    {id:'Full',     l:'Full',            c:'var(--yellow)', h:24},
    {id:'Yorker',   l:'Yorker',          c:'var(--teal)',   h:18},
  ];

  // ── Camera / Tap view
  var camView = '';
  if(r.err){
    camView = '<div style="text-align:center;padding:36px 20px">'
      +'<div style="font-size:48px;margin-bottom:14px">📷</div>'
      +'<p style="font-weight:700;margin-bottom:6px">Camera Unavailable</p>'
      +'<p style="font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:16px">'+r.err+'</p>'
      +'<button onclick="rzSwitchMode(\'estimate\')" class="btn b-blue" style="max-width:220px;margin:0 auto">Enter Speed Manually</button>'
    +'</div>';
  } else if(r.speed){
    // Result card
    camView = '<div class="a-pop" style="text-align:center;padding:28px 20px">'
      +'<div style="font-size:36px;margin-bottom:8px">'+cat.e+'</div>'
      +'<p class="lbl" style="margin-bottom:12px">Ball Speed</p>'
      +'<div style="display:inline-flex;align-items:flex-end;gap:6px;margin-bottom:12px">'
        +'<span style="font-size:92px;font-weight:900;line-height:1;letter-spacing:-.06em;color:'+cat.c+'" class="mono">'+r.speed+'</span>'
        +'<span style="font-size:26px;font-weight:700;color:'+cat.c+';padding-bottom:14px">km/h</span>'
      +'</div>'
      +'<div><span style="padding:7px 18px;border-radius:100px;background:'+cat.bg+';border:1px solid '+cat.c+'40;color:'+cat.c+';font-size:14px;font-weight:800">'+cat.l+'</span></div>'
    +'</div>';
  } else if(r.mode === 'estimate'){
    camView = '<div style="padding:24px 20px">'
      +'<p style="font-size:15px;font-weight:700;margin-bottom:4px;text-align:center">Enter Speed Manually</p>'
      +'<p style="font-size:12px;color:var(--t2);text-align:center;margin-bottom:18px">Type speed from radar gun / speed app</p>'
      +'<div style="position:relative;margin-bottom:14px">'
        +'<input id="radar-est" type="number" inputmode="decimal" class="inp" placeholder="e.g. 138.5" value="'+(r.estimateKmh||'')+'" style="font-size:32px;font-weight:900;text-align:center;height:72px;border-radius:16px" oninput="S.radar.estimateKmh=this.value">'

function postRender(){
  // Wire watch FAB click (avoids quoting issues)
  var wfab=document.getElementById('wfab');
  if(wfab) wfab.addEventListener('click',function(){goTab('watch');});
  if(S.tab==='radar'){
    const v=document.getElementById('cam-v');
    if(v){
      if(CAM_STREAM){ v.srcObject=CAM_STREAM; }
      else{
        navigator.mediaDevices?.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}})
          .then(s=>{
            CAM_STREAM=s; S.radar.camGranted=true; S.radar.err='';
            const vv=document.getElementById('cam-v');
            if(vv) vv.srcObject=s;
          })
          .catch(e=>{
            S.radar.err='Camera access denied. Use Manual Entry mode or grant camera permission in browser settings.';
            S.radar.camGranted=false;
            render();
          });
      }
    }
  }
  if(S.tab==='add'&&(S.mc.phase==='playing'||S.mc.phase==='so_playing')){
    requestAnimationFrame(attachScoringSwipe);
  }
}

function rzTap(){
  const r = S.radar;
  if(!r.on){
    r.on = true; r.t0 = Date.now(); r.speed = null;
  } else {
    r.on = false;
    const elapsed = (Date.now() - r.t0) / 1000;
    // 22 yards pitch = ~20.12 m; ball travel time → speed
    let sp = (20.12 / elapsed) * 3.6;
    sp = Math.min(Math.max(sp, 28), 168);
    r.speed = sp.toFixed(1);
    haptic('heavy');
  }
  render();
}

function rzSwitchMode(mode){
  S.radar.mode = mode;
  S.radar.speed = null;
  S.radar.on = false;
  S.radar.estimateKmh = '';
  render();
}

function rzSubmitEstimate(){
  const el = document.getElementById('radar-est');
  const bowlerEl = document.getElementById('radar-bowler');
  if(bowlerEl) S.radar.bowler = bowlerEl.value;
  const val = el ? Number(el.value) : Number(S.radar.estimateKmh);
  if(!val || val < 20 || val > 200){
    S.radar.err = 'Enter a valid speed between 20 and 200 km/h';
    render(); return;
  }
  S.radar.err = '';
  S.radar.speed = val.toFixed(1);
  haptic('medium');
  render();
}

function rzReset(){
  S.radar.speed = null;
  S.radar.zone  = '';
  S.radar.on    = false;
  S.radar.saved = false;
  S.radar.estimateKmh = '';
  render();
}

function rzSave(){
  const r = S.radar;
  if(!r.speed || r.saving || r.saved) return;
  // Read bowler name from DOM if present
  const bowlerEl = document.getElementById('radar-bowler');
  if(bowlerEl) r.bowler = bowlerEl.value;
  r.saving = true; render();
  const entry = {speed:r.speed, zone:r.zone||'', bowler:r.bowler||'', ts:Date.now()};
  if(!r.session) r.session = [];
  r.session.push(entry);
  r.saving = false; r.saved = true;
  haptic('medium');
  render();
  // Save to localStorage for persistence
  try{ localStorage.setItem('rs', JSON.stringify(r.session)); }catch(e){}
  // Auto-reset after 1.4 s
  setTimeout(()=>{
    S.radar.saved  = false;
    S.radar.speed  = null;
    S.radar.zone   = '';
    S.radar.on     = false;
    render();
  }, 1400);
}

function rzClearSession(){
  S.radar.session = [];
  try{ localStorage.removeItem('rs'); }catch(e){}
  render();
}

function rzExportSession(){
  const sess = S.radar.session || [];
  if(!sess.length){ alert('No readings to export'); return; }
  const rows = ['Timestamp,Bowler,Speed_kmh,Zone,Category'];
  sess.forEach(x=>{
    const cat = speedCat(x.speed);
    rows.push([new Date(x.ts).toLocaleString(),x.bowler||'',x.speed,x.zone||'',cat.l].map(v=>{
      const s=String(v||'');
      return s.includes(',')||s.includes('"')?'"'+s.replace(/"/g,'""')+'"':s;
    }).join(','));
  });
  const blob = new Blob([rows.join('\r\n')],{type:'text/csv'});
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'),{href:url,download:'speed_radar_session.csv'});
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1500);
}

// ── Ball history helpers ────────────────────────────
function ballLabel(b){
  if(b.wkt) return 'W'+(b.r>0?'+'+b.r:'');
  if(b.wd)  return 'WD'+(b.r>1?'+'+(b.r-1):'');
  if(b.nb)  return 'NB'+(b.r>1?'+'+(b.r-1):'');
  if(b.bye) return 'B'+(b.r>0?b.r:'');
  if(b.lb)  return 'LB'+(b.r>0?b.r:'');
  if(b.r===4) return '4';
  if(b.r===6) return '6';
  return String(b.r);
}
function ballColor(b){
  if(b.wkt)        return{bg:'rgba(255,59,48,.25)',border:'rgba(255,59,48,.6)',txt:'#FF3B30'};
  if(b.wd||b.nb)   return{bg:'rgba(255,214,10,.2)',border:'rgba(255,214,10,.5)',txt:'#FFD60A'};
  if(b.bye||b.lb)  return{bg:'rgba(90,200,250,.2)',border:'rgba(90,200,250,.5)',txt:'#5AC8FA'};
  if(b.r===6)      return{bg:'rgba(48,209,88,.2)',border:'rgba(48,209,88,.5)',txt:'#30D158'};
  if(b.r===4)      return{bg:'rgba(10,132,255,.2)',border:'rgba(10,132,255,.5)',txt:'#0A84FF'};
  if(b.r===0)      return{bg:'rgba(255,255,255,.06)',border:'rgba(255,255,255,.2)',txt:'#fff'};
  return{bg:'rgba(255,255,255,.1)',border:'rgba(255,255,255,.3)',txt:'#fff'};
}
function ballHistoryHTML(history){
  if(!history||!history.length) return '';
  const last=history.slice(-6);
  const pills=last.map(b=>{
    const c=ballColor(b), lbl=ballLabel(b);
    return '<span style="display:inline-flex;align-items:center;justify-content:center;min-width:32px;height:32px;border-radius:8px;font-size:12px;font-weight:800;background:'+c.bg+';border:1px solid '+c.border+';color:'+c.txt+';padding:0 6px">'+lbl+'</span>';
  }).join('');
  // Over breakdown
  const thisOver=history.filter(b=>b.legal).length%6;
  const totalBalls=history.filter(b=>b.legal).length;
  return '<div style="background:var(--bg2);border-radius:12px;padding:12px 14px;margin-bottom:10px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
      +'<span class="lbl" style="font-size:9px">This Over</span>'
      +'<span style="font-size:10px;color:var(--t3)" class="mono">'+totalBalls+' legal balls</span>'
    +'</div>'
    +'<div style="display:flex;gap:6px;flex-wrap:wrap">'+pills+'</div>'
  +'</div>';
}

// ── Undo system ─────────────────────────────────────
function pushUndo(){
  const mc=S.mc;
  if(!mc.undoStack) mc.undoStack=[];
  mc.undoStack.push({
    scores:JSON.parse(JSON.stringify(mc.scores)),
    pStats:JSON.parse(JSON.stringify(mc.pStats)),
    striker:mc.striker,nonStriker:mc.nonStriker,
    ballHistory:JSON.parse(JSON.stringify(mc.ballHistory||[])),
    extras:JSON.parse(JSON.stringify(mc.extras||{wd:0,nb:0,bye:0,lb:0})),
    inn:mc.inn,batTeam:mc.batTeam,phase:mc.phase
  });
  if(mc.undoStack.length>20) mc.undoStack.shift();
}
function mcUndo(){
  const mc=S.mc;
  if(!mc.undoStack||!mc.undoStack.length){haptic('light');return;}
  const prev=mc.undoStack.pop();
  mc.scores=prev.scores;mc.pStats=prev.pStats;
  mc.striker=prev.striker;mc.nonStriker=prev.nonStriker;
  mc.ballHistory=prev.ballHistory;mc.extras=prev.extras;
  mc.inn=prev.inn;mc.batTeam=prev.batTeam;mc.phase=prev.phase;
  mc.popup=null;
  haptic('medium');render();
}
function mcRepeatLast(){
  const mc=S.mc;
  const h=mc.ballHistory||[];
  if(!h.length){haptic('light');return;}
  const last=h[h.length-1];
  if(last.wkt){haptic('light');return;} // don't repeat wickets
  pushUndo();
  applyBall({...last});
  haptic('medium');
}

// ── Haptic ─────────────────────────────────────────
function haptic(style){
  try{
    if(window.navigator&&window.navigator.vibrate){
      style==='heavy'?navigator.vibrate(40):style==='medium'?navigator.vibrate(18):navigator.vibrate(8);
    }
  }catch(e){}
}

// ── Core ball application ───────────────────────────
// ballObj = {r, legal, wkt, wd, nb, bye, lb, wktType, wktFielder, extras}
function applyBall(b){
  const mc=S.mc;
  const cs=mc.scores[mc.batTeam];
  const maxB=mc.md.overs*6;
  if(!mc.ballHistory) mc.ballHistory=[];
  if(!mc.extras) mc.extras={wd:0,nb:0,bye:0,lb:0};

  // Update team score
  mc.scores[mc.batTeam]={
    r:cs.r+b.r,
    w:cs.w+(b.wkt?1:0),
    b:cs.b+(b.legal?1:0)
  };
  // Update extras counters
  if(b.wd) mc.extras.wd=(mc.extras.wd||0)+1;
  if(b.nb) mc.extras.nb=(mc.extras.nb||0)+1;
  if(b.bye) mc.extras.bye=(mc.extras.bye||0)+(b.r||0);
  if(b.lb) mc.extras.lb=(mc.extras.lb||0)+(b.r||0);

  // Update batter stats (only on legal, non-bye/lb)
  if(b.legal&&!b.bye&&!b.lb){
    const p=mc.pStats[mc.striker]||{r:0,b:0,fours:0,sixes:0,t:''};
    mc.pStats[mc.striker]={
      ...p,
      r:p.r+(b.wkt?0:b.r), // run out: only completed runs
      b:p.b+1,
      fours:p.fours+(b.r===4?1:0),
      sixes:p.sixes+(b.r===6?1:0)
    };
  } else if(b.legal&&(b.bye||b.lb)){
    // ball faced but no runs to batter
    const p=mc.pStats[mc.striker]||{r:0,b:0,fours:0,sixes:0,t:''};
    mc.pStats[mc.striker]={...p,b:p.b+1};
  }

  // Ball history
  mc.ballHistory.push({...b});

  // Check chase completion (inn 2 only)
  if(mc.inn===2){
    const ncs=mc.scores[mc.batTeam];
    const target=mc.scores[mc.batTeam===1?2:1].r+1;
    if(ncs.r>=target){
      mc.phase='completed';
      mc.result={winner:mc.batTeam===1?mc.md.t1:mc.md.t2,method:'chase',margin:(10-ncs.w)+' wicket'+(10-ncs.w!==1?'s':'')};
      haptic('heavy');mc.popup=null;render();return;
    }
    if((b.wkt&&ncs.w>=10)||(!b.wkt&&b.legal&&ncs.b>=maxB)){
      checkTieOrResult();return;
    }
  }
  // Inn 1 over/allout
  if(mc.inn===1){
    const ncs=mc.scores[mc.batTeam];
    if((b.wkt&&ncs.w>=10)||(!b.wkt&&b.legal&&ncs.b>=maxB)){
      mcEndInn(false);return;
    }
  }

  // Wicket → need next batter
  if(b.wkt){
    mc.pendRot=b.legal&&(cs.b+1)%6===0;
    mc.nextBat='';mc.wModal=true;mc.popup=null;render();return;
  }

  // End of over
  if(b.legal&&(cs.b+1)%6===0){
    // rotate automatically
    const tmp=mc.striker;mc.striker=mc.nonStriker;mc.nonStriker=tmp;
  } else if(!b.wkt){
    // rotate on 1 or 3
    if(b.r===1||b.r===3){const tmp=mc.striker;mc.striker=mc.nonStriker;mc.nonStriker=tmp;}
  }

  mc.popup=null;render();
}

}
function submitNB(runs){
  pushUndo();
  haptic('medium');
  applyBall({r:1+runs,legal:false,nb:true,wkt:false,wd:false,bye:false,lb:false});
}
function submitExtra(type,runs){
  pushUndo();
  haptic('medium');
  const bye=type==='bye',lb=type==='lb';
  applyBall({r:runs,legal:true,bye,lb,wd:false,nb:false,wkt:false});
}
function selectWktType(wt){
  S.mc.popup.data.wktType=wt;
  if(wt==='Bowled'||wt==='LBW'||wt==='Hit Wicket'){
    submitWkt();
  } else {
    S.mc.popup.step=2;
    if(wt==='Run Out') S.mc.popup.data.runout_out=S.mc.striker;
    render();
  }
}
function submitWkt(){
  const mc=S.mc,p=mc.popup;
  const wt=p?p.data.wktType:'Bowled';
  const fielder=document.getElementById('wkt_fielder')?document.getElementById('wkt_fielder').value:'';
  if(p&&p.data) p.data.fielder=fielder;
  const runs=p&&wt==='Run Out'?(p.data.runout_runs||0):0;
  const outBatter=p&&wt==='Run Out'?(p.data.runout_out||mc.striker):mc.striker;
  // For run out, save who's actually out
  mc._wktOutBatter=outBatter;
  mc._wktType=wt;
  mc._wktFielder=fielder||'';
  pushUndo();
  haptic('heavy');
  applyBall({r:runs,legal:true,wkt:true,wktType:wt,wktFielder:fielder,wd:false,nb:false,bye:false,lb:false});
}

// ── SO ball entry point ─────────────────────────────
function soBall2(run){
  haptic('light');
  const mc=S.mc,so=mc.so;
  const cs=so.scores[so.batTeam];
  if(cs.b>=6) return;
  so.scores[so.batTeam]={r:cs.r+run,w:cs.w,b:cs.b+1};
  const p=so.pStats[so.striker]||{r:0,b:0};
  so.pStats[so.striker]={...p,r:p.r+run,b:p.b+1};
  if(!mc.ballHistory) mc.ballHistory=[];
  mc.ballHistory.push({r:run,legal:true,wkt:false,wd:false,nb:false,bye:false,lb:false});
  const ncs=so.scores[so.batTeam];
  if(so.inn===2){
    const tgt2=so.scores[so.batTeam===1?2:1].r+1;
    if(ncs.r>=tgt2){soFinish();return;}
    if(ncs.b>=6){soFinish();return;}
  }
  if(ncs.b>=6){soNextInn();return;}
  if(run===1||run===3){const tmp=so.striker;so.striker=so.nonStriker;so.nonStriker=tmp;}
  if((cs.b+1)%6===0){const tmp=so.striker;so.striker=so.nonStriker;so.nonStriker=tmp;}
  render();
}

          +(mc.saveStatus==='loading'?'<span class="spin" style="display:inline-flex">'+IC.ref+'</span> Saving…':mc.saveStatus==='success'?IC.ok+' Saved!':'💾 Save & Close Match')
        +'</button>'
        +        +'<button onclick="generateMatchLink()" style="width:100%;height:48px;border-radius:14px;border:1px solid rgba(10,132,255,.3);background:rgba(10,132,255,.1);color:var(--blue);font-size:14px;font-weight:700;cursor:pointer;margin-bottom:10px">📤 Share Live Score</button>'
'<button onclick="mcReset()" class="btn b-ghost">New Match</button>'

}

// ── MATCH LOGIC ─────────────────────────────────────
function readForm(){
  const g=id=>{const e=document.getElementById(id);return e?e.value:'';};
  S.mc.form.player=g('fp');S.mc.form.team=g('ft');S.mc.form.session=g('fs');
  S.mc.form.speed=g('fspd');S.mc.form.runs=g('fr');S.mc.form.balls=g('fb');
  S.mc.form.overs=g('fo');S.mc.form.wickets=g('fw');
  const ln=g('lname');if(ln)S.mc.md.name=ln;
  const ld=g('ldate');if(ld)S.mc.md.date=ld;
  const lt=g('ltype');if(lt)S.mc.md.type=lt;
  const lv=g('lov');if(lv)S.mc.md.overs=Number(lv)||S.mc.md.overs;
  const t1=g('lt1');if(t1)S.mc.md.t1=t1;
  const t2=g('lt2');if(t2)S.mc.md.t2=t2;
  const tw=g('ltw');if(tw)S.mc.tossW=Number(tw);
  const tc=g('ltc');if(tc)S.mc.tossC=tc;
  if(g('lstr'))S.mc.striker=g('lstr');
  if(g('lnstr'))S.mc.nonStriker=g('lnstr');
  if(g('lbwl'))S.mc.bowler=g('lbwl');
  if(g('lnb'))S.mc.nextBat=g('lnb');
  if(g('sostr'))S.mc.so.striker=g('sostr');
  if(g('sonstr'))S.mc.so.nonStriker=g('sonstr');
  if(g('sobwl'))S.mc.so.bowler=g('sobwl');
}
function syncTeamName(num,val){
  const v=val.trim()||(num===1?'Team 1':'Team 2');
  if(num===1)S.mc.md.t1=val; else S.mc.md.t2=val;
  const sel=document.getElementById('ltw');
  if(sel&&sel.options[num-1])sel.options[num-1].text=v;
}
function mcSetup(){
  readForm();S.mc.ferr='';
  const t1el=document.getElementById('lt1'),t2el=document.getElementById('lt2');
  if(t1el)S.mc.md.t1=t1el.value.trim();
  if(t2el)S.mc.md.t2=t2el.value.trim();
  if(!S.mc.md.name.trim()){S.mc.ferr='Match name required';render();return;}
  if(!S.mc.md.t1.trim()||!S.mc.md.t2.trim()){S.mc.ferr='Both team names required';render();return;}
  let bat=1;
  if(S.mc.tossW===1&&S.mc.tossC==='Bowl')bat=2;
  if(S.mc.tossW===2&&S.mc.tossC==='Bat')bat=2;
  S.mc.batTeam=bat;S.mc.inn=1;
  S.mc.scores={1:{r:0,w:0,b:0},2:{r:0,w:0,b:0}};
  S.mc.pStats={};S.mc.ballHistory=[];S.mc.extras={wd:0,nb:0,bye:0,lb:0};
  S.mc.undoStack=[];S.mc.popup=null;
  S.mc.phase='setup_inn';render();
}
function mcStartInn(){
  readForm();S.mc.ferr='';
  if(!S.mc.striker||!S.mc.nonStriker){S.mc.ferr='Enter both openers';render();return;}
  const bat=S.mc.batTeam===1?S.mc.md.t1:S.mc.md.t2;
  const bowl=S.mc.batTeam===1?S.mc.md.t2:S.mc.md.t1;
  const init=(n,t)=>{if(!n||S.mc.pStats[n])return;S.mc.pStats[n]={r:0,b:0,fours:0,sixes:0,t};};
  init(S.mc.striker,bat);init(S.mc.nonStriker,bat);if(S.mc.bowler)init(S.mc.bowler,bowl);
  S.mc.phase='playing';render();
}
function mcConfWkt(){
  readForm();const mc=S.mc;if(!mc.nextBat)return;
  const bat=mc.batTeam===1?mc.md.t1:mc.md.t2;
  if(!mc.pStats[mc.nextBat])mc.pStats[mc.nextBat]={r:0,b:0,fours:0,sixes:0,t:bat};
  let ns=mc.nextBat,nn=mc.nonStriker;if(mc.pendRot)[ns,nn]=[nn,ns];
  mc.striker=ns;mc.nonStriker=nn;mc.wModal=false;
  if(mc.scores[mc.batTeam].w>=10){if(mc.inn===2)checkTieOrResult();else mcEndInn(false);}
  else render();
}
function mcEndInn(fromBtn=true){
  const mc=S.mc;
  if(fromBtn){S.mc.popup={type:'end_inn',step:1,data:{}};render();return;}
  if(mc.inn===1){
    mc.batTeam=mc.batTeam===1?2:1;mc.inn=2;
    mc.striker='';mc.nonStriker='';mc.bowler='';mc.phase='setup_inn';render();
  } else {checkTieOrResult();}
}
function confirmEndInn(){S.mc.popup=null;mcEndInn(false);}
function checkTieOrResult(){
  const mc=S.mc,s1=mc.scores[1].r,s2=mc.scores[2].r;
  if(s1===s2){mc.phase='tied';render();}
  else{
    mc.result={winner:s1>s2?mc.md.t1:mc.md.t2,margin:Math.abs(s1-s2)+' runs',method:'runs',isDraw:false};
    mc.phase='result';render();
  }
}
function mcFinalise(method,declaredWinner){
  const mc=S.mc;
  if(method==='tie'){mc.result={isDraw:true,method:'tie'};mc.phase='result';render();}
  else if(method==='declare'){mc.result={winner:declaredWinner,method:'declare',isDraw:false};mc.phase='result';render();}
  else if(method==='chase'){mc.phase='result';render();}
}
function showDeclare(){S.mc.phase='declare';render();}

// ── SUPER OVER LOGIC ────────────────────────────────
function startSuperOver(){
  const mc=S.mc;
  const soFirst=mc.batTeam===1?2:1;
  mc.so={inn:1,batTeam:soFirst,scores:{1:{r:0,w:0,b:0},2:{r:0,w:0,b:0}},
    striker:'',nonStriker:'',bowler:'',pStats:{},wModal:false,nextBat:'',pendRot:false};
  mc.phase='so_setup';mc.ferr='';render();
}
function soStartInn(){
  readForm();S.mc.ferr='';
  const so=S.mc.so;
  if(!so.striker||!so.nonStriker){S.mc.ferr='Enter both batsmen';render();return;}
  const bat=so.batTeam===1?S.mc.md.t1:S.mc.md.t2;
  const bowl=so.batTeam===1?S.mc.md.t2:S.mc.md.t1;
  const init=(n,t)=>{if(!n||so.pStats[n])return;so.pStats[n]={r:0,b:0,t};};
  init(so.striker,bat);init(so.nonStriker,bat);if(so.bowler)init(so.bowler,bowl);
  S.mc.phase='so_playing';render();
}
function soConfWkt(){
  readForm();const so=S.mc.so;if(!so.nextBat)return;
  const bat=so.batTeam===1?S.mc.md.t1:S.mc.md.t2;
  if(!so.pStats[so.nextBat])so.pStats[so.nextBat]={r:0,b:0,t:bat};
  let ns=so.nextBat,nn=so.nonStriker;if(so.pendRot)[ns,nn]=[nn,ns];
  so.striker=ns;so.nonStriker=nn;so.wModal=false;
  if(so.scores[so.batTeam].w>=2){if(so.inn===1)soNextInn();else soFinish();}
  else render();
}
function soNextInn(){
  const mc=S.mc,so=mc.so;
  so.batTeam=so.batTeam===1?2:1;so.inn=2;
  so.striker='';so.nonStriker='';so.bowler='';
  mc.phase='so_setup';mc.ferr='';render();
}
function soFinish(){
  const mc=S.mc,so=mc.so;
  const r1=so.scores[1].r,r2=so.scores[2].r;
  if(r1>r2)mc.result={winner:mc.md.t1,method:'so',margin:'SO: '+r1+' vs '+r2,isDraw:false};
  else if(r2>r1)mc.result={winner:mc.md.t2,method:'so',margin:'SO: '+r1+' vs '+r2,isDraw:false};
  else mc.result={isDraw:true,method:'so',margin:'SO Tied: '+r1+' vs '+r2};
  mc.phase='result';render();
}

// ── SAVE ────────────────────────────────────────────
async function mcSaveResult(){
  const mc=S.mc;mc.saveStatus='loading';render();
  const ts=new Date().toISOString();
  const tossTeam=mc.tossW===1?mc.md.t1:mc.md.t2;
  const resultStr=mc.result?.isDraw?'Tied':mc.result?.winner?' Won: '+mc.result.winner:'';
  const sess=mc.md.name+' ['+mc.md.type+'] (Toss: '+tossTeam+' chose to '+mc.tossC+') '+resultStr;
  await Promise.all(Object.entries(mc.pStats).map(([name,p])=>{
    if(!p.r&&!p.b)return Promise.resolve();
    return saveRow({timestamp:ts,player:name,team:p.t||'',session:sess,speed:'',
      runs:p.r,balls:p.b,overs:+(Math.floor(p.b/6)+(p.b%6)/10),wickets:0,
      strikeRate:sr(p.r,p.b),economy:'0.00'});
  }));
  if(mc.so&&Object.keys(mc.so.pStats||{}).length){
    await Promise.all(Object.entries(mc.so.pStats).map(([name,p])=>{
      if(!p.r&&!p.b)return Promise.resolve();
      return saveRow({timestamp:ts,player:name,team:p.t||'',session:sess+' (SO)',speed:'',
        runs:p.r,balls:p.b,overs:+(Math.floor(p.b/6)+(p.b%6)/10),wickets:0,
        strikeRate:sr(p.r,p.b),economy:'0.00'});
    }));
  }
  mc.saveStatus='success';render();fetchData();
}
async function mcSave(){
  const mc=S.mc;mc.saveStatus='loading';render();
  if(mc.mode==='manual'){
    if(!mc.form.player){mc.saveStatus='idle';render();return;}
    const R=Number(mc.form.runs)||0,B=Number(mc.form.balls)||0,O=Number(mc.form.overs)||0;
    await saveRow({...mc.form,timestamp:new Date().toISOString(),strikeRate:sr(R,B),economy:eco(R,O)});
  }
  mc.saveStatus='success';render();fetchData();
  setTimeout(()=>{mc.saveStatus='idle';if(mc.mode==='manual'){mc.form={...mc.form,speed:'',runs:'',balls:'',overs:'',wickets:''};}render();},2000);
}
function mcReset(){S.mc=freshMC();if(S.players.length)S.mc.form.player=S.players[0].name;render();}

// ── Swipe gesture on scoring screen ─────────────────
function attachScoringSwipe(){
  const el=document.getElementById('scoring-root');
  if(!el||el._swipe) return;
  el._swipe=true;
  let sx=0,sy=0;
  el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
  el.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx;
    const dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){
      if(dx<0) mcUndo();         // swipe left = undo
      else     mcRepeatLast();   // swipe right = repeat last
    }
  },{passive:true});
}

/* ── State helpers ─────────────────────────────── */
function saveWatchHistory(){
  try{ localStorage.setItem('wh', JSON.stringify(S.watch.history)); }catch(e){}
}

/* ── URL parser / classifier ───────────────────── */
function parseWatchURL(raw){
  raw = (raw||'').trim();
  if(!raw) return {ok:false, msg:'Please paste a match link first'};

  // auto-prepend scheme
  if(!/^https?:\/\//i.test(raw)) raw = 'https://' + raw;

  // block javascript/data URIs
  if(/^(javascript|data|vbscript):/i.test(raw))
    return {ok:false, msg:'That URL looks unsafe and cannot be loaded'};

  let url;
  try{ url = new URL(raw); }
  catch(e){ return {ok:false, msg:'Invalid URL — please check the link and try again'}; }

  const host = url.hostname.replace(/^www\./,'').toLowerCase();

  /* ── YouTube (all formats) ── */
  if(host === 'youtube.com' || host === 'youtu.be' ||
     host === 'm.youtube.com' || host === 'music.youtube.com'){
    let vid = '';
    // youtu.be/VIDEO_ID
    if(host === 'youtu.be'){
      vid = url.pathname.split('/').filter(Boolean)[0] || '';
    }
    // youtube.com/live/VIDEO_ID
    else if(url.pathname.startsWith('/live/')){
      vid = url.pathname.split('/live/')[1]?.split(/[?&/]/)[0] || '';
    }
    // youtube.com/watch?v=VIDEO_ID
    else if(url.searchParams.has('v')){
      vid = url.searchParams.get('v') || '';
    }
    // youtube.com/shorts/VIDEO_ID
    else if(url.pathname.startsWith('/shorts/')){
      vid = url.pathname.split('/shorts/')[1]?.split(/[?&/]/)[0] || '';
    }
    // youtube.com/embed/VIDEO_ID
    else if(url.pathname.startsWith('/embed/')){
      vid = url.pathname.split('/embed/')[1]?.split(/[?&/]/)[0] || '';
    }
    if(!vid) return {ok:false, msg:'Could not find a YouTube video ID in that link'};
    const embed = 'https://www.youtube.com/embed/' + vid
      + '?autoplay=1&mute=1&rel=0&modestbranding=1&playsinline=1&fs=1';
    return {ok:true, type:'youtube', embed, raw, host:'YouTube', vid,
            title:'YouTube Live · ' + vid};
  }

  /* ── Platforms that always block iframes (DRM / CSP) ── */
  const alwaysExternal = [
    'hotstar.com','disney+hotstar.com','jiocinema.com','jio.com',
    'sonyliv.com','primevideo.com','amazon.com/primevideo',
    'netflix.com','hulu.com','peacocktv.com',
    'espn.com','espnplus.com','willowcricket.com',
  ];
  if(alwaysExternal.some(d => host.includes(d)))
    return {ok:true, type:'external', raw, host, title: host};

  /* ── Sites that usually work in iframe ── */
  const iframeFriendly = [
    'cricbuzz.com','cricinfo.com','espncricinfo.com',
    'cricheroes.in','cricheroes.com',
    'fancode.com',  // may need login
    'cricketscorecard.com','live.cricketscorecard.com',
    'crickettoss.com','pagesix.com',
  ];
  // everything else → try iframe, always show "Open in browser" fallback
  return {ok:true, type:'iframe', raw, host, title: host};
}

/* ── Open watch URL ────────────────────────────── */
function openWatchURL(){
  // Read from DOM first (user may not have triggered oninput yet)
  const inputEl = document.getElementById('watch-input');
  const raw = inputEl ? inputEl.value : S.watch.input;
  S.watch.input = raw;
  const parsed = parseWatchURL(raw);
  if(!parsed.ok){
    S.watch.status = 'error';
    S.watch.statusMsg = parsed.msg;
    render(); return;
  }
  // store parsed result and go to player
  S.watch.parsed   = parsed;
  S.watch.url      = parsed.raw;
  S.watch.active   = true;
  S.watch.status   = 'ready';
  S.watch.copied   = false;
  S.watch.shareLink = window.location.href.split('?')[0] + '?live=' + encodeURIComponent(parsed.raw);
  // history (de-dupe by URL)
  const h = (S.watch.history||[]).filter(x => x.url !== parsed.raw);
  h.unshift({url: parsed.raw, host: parsed.host, title: parsed.title, ts: Date.now()});
  // prune older than 30 days, keep max 5
  var cutoff = Date.now() - 30*24*60*60*1000;
  S.watch.history = h.filter(function(x){ return x.ts > cutoff; }).slice(0,5);
  saveWatchHistory();
  render();
}

function clearWatch(){
  S.watch.input=''; S.watch.url=''; S.watch.active=false;
  S.watch.status='idle'; S.watch.statusMsg=''; S.watch.parsed=null;
  render();
}

async function pasteFromClipboard(){
  try{
    const text = await navigator.clipboard.readText();
    if(text){ S.watch.input = text; render();
      // focus input after render
      requestAnimationFrame(()=>{
        const el = document.getElementById('watch-input');
        if(el){ el.value = text; el.focus(); }
      });
    }
  }catch(e){
    // clipboard access denied — just focus the input
    requestAnimationFrame(()=>{
      const el = document.getElementById('watch-input');
      if(el) el.focus();
    });
  }
}

function openInBrowser(){
  const u = S.watch.url || S.watch.input;
  if(!u) return;
  window.open(u, '_blank', 'noopener,noreferrer');
}

function shareWatchLink(){
  const link = S.watch.shareLink || '';
  if(!link) return;
  if(navigator.share){
    navigator.share({title:'Watch Live Cricket', url:link}).catch(()=>{});
  } else {
    const copy = (txt) => {
      if(navigator.clipboard) navigator.clipboard.writeText(txt);
      else { const t=document.createElement('textarea');t.value=txt;
             document.body.appendChild(t);t.select();document.execCommand('copy');
             document.body.removeChild(t); }
      S.watch.copied=true; render();
      setTimeout(()=>{ S.watch.copied=false; render(); }, 2200);
    };
    copy(link);
  }
}

/* ── Generate shareable live-score link ─────────── */
function generateMatchLink(){
  const mc = S.mc;
  const d  = {
    t1:mc.md.t1, t2:mc.md.t2, name:mc.md.name, type:mc.md.type,
    s1:mc.scores[1], s2:mc.scores[2], inn:mc.inn,
    winner:mc.result ? mc.result.winner : null
  };
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(d))));
  const link    = window.location.href.split('?')[0] + '?match=' + encoded;
  if(navigator.share){
    navigator.share({title:'Live Score: '+mc.md.name, text:mc.md.t1+' vs '+mc.md.t2, url:link}).catch(()=>{});
  } else {
    const copyIt = txt => {
      if(navigator.clipboard) navigator.clipboard.writeText(txt).catch(()=>{});
      else { const t=document.createElement('textarea');t.value=txt;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t); }
      S.mc._linkCopied = true; render();
      setTimeout(()=>{ S.mc._linkCopied=false; render(); }, 2200);
    };
    copyIt(link);
  }
}

/* ── Handle deep-link query params on boot ───────── */
function handleURLParams(){
  try{
    const sp       = new URLSearchParams(location.search);
    const liveURL  = sp.get('live');
    const matchRaw = sp.get('match');
    if(liveURL){
      S.watch.input = decodeURIComponent(liveURL);
      S.tab = 'watch';
      // trigger open after first render
      requestAnimationFrame(()=>{ openWatchURL(); });
    }
    if(matchRaw){
      try{
        const d = JSON.parse(decodeURIComponent(escape(atob(matchRaw))));
        S._sharedMatch = d; S.tab = 'home';
      }catch(e){}
    }
  }catch(e){}
}

  var banner = '';

    banner='<div class="banner" style="background:rgba(10,132,255,.08);border:1px solid rgba(10,132,255,.2);color:var(--blue);margin:0 0 20px"><span class="spin" style="display:inline-flex">'+IC.ref+'</span><span>Syncing with Google Sheet…</span></div>';
  else if(S.fStatus==='error')
    banner='<div class="banner" style="background:rgba(255,59,48,.08);border:1px solid rgba(255,59,48,.25);color:var(--red);margin:0 0 20px;flex-direction:column;align-items:flex-start"><p style="font-weight:800;margin-bottom:4px">⚠ Cannot reach Google Sheet</p><p style="font-size:12px;color:var(--t2)">Check GAS deployment → Execute as Me, Anyone.</p><button onclick="fetchData()" style="margin-top:8px;padding:6px 14px;border-radius:8px;background:var(--red);border:none;color:#fff;font-size:12px;font-weight:700;cursor:pointer">↻ Retry</button></div>';
  else if(S.fStatus==='ok'&&!d.length)
    banner='<div class="banner" style="background:rgba(48,209,88,.08);border:1px solid rgba(48,209,88,.2);color:var(--green);margin:0 0 20px">✅ Sheet connected — save your first match!</div>';

  // ── Assemble layout ─────────────────────────────
  return ''
    +banner

    // Stat grid (4 cols on desktop via CSS .dt-home-grid)
    +'<div class="dt-home-grid">'+statCards+'</div>'

    // Two equal columns: Latest Match | Recent Matches
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px">'
      +matchCard
      +'<div class="card" style="padding:22px">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'
          +'<p class="lbl">Recent Matches</p>'
          +'<span style="font-size:11px;color:var(--t3)">'+matches.length+' total</span>'
        +'</div>'
        +(recentMatches||'<p style="color:var(--t3);font-size:13px;text-align:center;padding:20px">No matches recorded yet</p>')
      +'</div>'
    +'</div>'

    // Upcoming — ALWAYS shown, even when empty
    +'<div class="card" style="padding:22px">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'
        +'<div>'
          +'<p class="lbl" style="margin-bottom:2px">Upcoming Fixtures</p>'
          +'<p style="font-size:12px;color:var(--t3)">'+(S.upcoming&&S.upcoming.length?S.upcoming.length+' scheduled':'No fixtures yet — schedule one!')+'</p>'
        +'</div>'
        +'<button onclick="S.upcomingSheet=true;S.upcomingForm={t1:\'\',t2:\'\',date:\'\',time:\'\',venue:\'\',type:\'Practice\'};render()" style="display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:10px;background:var(--blue);border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer">'+IC.plus+' Add Match</button>'
      +'</div>'
      +(upcomingRows
        ?'<div style="display:flex;flex-direction:column;gap:8px">'+upcomingRows+'</div>'
        :'<div style="text-align:center;padding:28px 20px;background:var(--bg2);border-radius:14px">'
          +'<p style="font-size:28px;margin-bottom:8px">📅</p>'
          +'<p style="font-weight:700;margin-bottom:4px">No upcoming matches</p>'
          +'<p style="font-size:12px;color:var(--t3)">Tap Add Match above to schedule a fixture</p>'
        +'</div>'
      )
    +'</div>'
    +upcomingSheetHTML();
}


/* ── Desktop Scoring Layout (3-col) ────────────── */
function dtScoringLayout(){
  var mc = S.mc;
  var isSOMode = mc.phase === 'so_playing';
  var src = isSOMode ? mc.so : mc;
  var batTeam = src.batTeam;
  var cs = src.scores[batTeam];
  var batName = batTeam===1 ? mc.md.t1 : mc.md.t2;
  var maxBalls = isSOMode ? 6 : mc.md.overs*6;
  var ps = src.pStats;
  if(!mc.ballHistory) mc.ballHistory=[];
  if(!mc.extras) mc.extras={wd:0,nb:0,bye:0,lb:0};

  // Target
  var tgt=null,needRuns=null,ballsLeft=null;
  if(!isSOMode&&mc.inn===2){tgt=mc.scores[batTeam===1?2:1].r+1;needRuns=tgt-cs.r;ballsLeft=maxBalls-cs.b;}
  if(isSOMode&&mc.so.inn===2){tgt=mc.so.scores[batTeam===1?2:1].r+1;needRuns=tgt-cs.r;ballsLeft=6-cs.b;}
  var rrr=needRuns&&ballsLeft>0?((needRuns/(ballsLeft/6)).toFixed(2)):null;
  var crr=cs.b>=6?((cs.r/(cs.b/6)).toFixed(2)):null;

  var ex=mc.extras||{};
  var extrasTotal=(ex.wd||0)+(ex.nb||0)+(ex.bye||0)+(ex.lb||0);

  // ── LEFT: scorecard + batters
  var left = '<div class="dt-scorecard">'
    +'<div style="text-align:center;padding:8px 0 16px">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
        +'<p class="lbl" style="font-size:10px">'+batName+'</p>'
        +(isSOMode?'<div class="so-badge">'+IC.flash+' SO '+mc.so.inn+'/2</div>':'<div class="lbadge"><span class="ldot"></span>Live</div>')
      +'</div>'
      +'<div style="display:flex;align-items:baseline;justify-content:center;gap:4px;margin-bottom:6px">'
        +'<span style="font-size:80px;font-weight:900;line-height:1;letter-spacing:-.05em" class="mono">'+cs.r+'</span>'
        +'<span style="font-size:44px;color:var(--t3);font-weight:800" class="mono">/'+cs.w+'</span>'
      +'</div>'
      +'<p style="font-size:18px;font-weight:700;color:'+(cs.b>=maxBalls?'var(--red)':'var(--t2)')+'" class="mono">'+ov(cs.b)+' <span style="font-size:13px;color:var(--t3)">/ '+(isSOMode?1:mc.md.overs)+' ov</span></p>'
      +(tgt?'<div style="margin-top:12px;padding:10px 16px;background:rgba(255,214,10,.1);border:1px solid rgba(255,214,10,.25);border-radius:12px;display:inline-block"><p style="color:var(--yellow);font-size:14px;font-weight:700">🎯 Need '+Math.max(needRuns,0)+' from '+ballsLeft+' balls</p>'+(rrr?'<p style="color:var(--t2);font-size:12px;margin-top:2px">RRR: '+rrr+(crr?' · CRR: '+crr:'')+'</p>':'')+'</div>':'')
    +'</div>'
    // Batter table
    +'<div style="background:var(--bg2);border-radius:14px;overflow:hidden;margin-bottom:14px">'
      +'<div style="display:grid;grid-template-columns:1fr 50px 50px 60px;padding:8px 14px;border-bottom:1px solid var(--sep)">'
        +['Batter','R','B','SR'].map(function(h,i){return '<p class="lbl" style="margin:0;font-size:10px;text-align:'+(i>0?'center':'left')+'">'+h+'</p>';}).join('')
      +'</div>'
      +[{n:src.striker,on:true},{n:src.nonStriker,on:false}].map(function(x){
        var n=x.n,on=x.on;
        return '<div style="display:grid;grid-template-columns:1fr 50px 50px 60px;padding:12px 14px;border-top:'+(on?'none':'1px solid var(--sep)')+';background:'+(on?'rgba(255,255,255,.04)':'transparent')+';align-items:center">'
          +'<div style="display:flex;align-items:center;gap:8px">'+(on?'<div style="width:6px;height:6px;border-radius:3px;background:var(--red)"></div>':'')+'<span style="font-size:14px;font-weight:'+(on?700:500)+';color:'+(on?'#fff':'var(--t2)')+'">'+( n||'—')+'</span></div>'
          +'<span style="font-size:15px;font-weight:700;text-align:center;color:'+(on?'#fff':'var(--t2)')+'" class="mono">'+(ps[n]?ps[n].r:0)+'</span>'
          +'<span style="font-size:14px;text-align:center;color:var(--t2)" class="mono">'+(ps[n]?ps[n].b:0)+'</span>'
          +'<span style="font-size:12px;text-align:center;color:var(--t3)" class="mono">'+(ps[n]&&ps[n].b>0?sr(ps[n].r,ps[n].b):'0.0')+'</span>'
        +'</div>';
      }).join('')
    +'</div>'
    // 1st inn summary
    +(!isSOMode&&mc.inn===2?'<div style="background:var(--bg2);border-radius:12px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center"><p style="font-size:12px;font-weight:600;color:var(--t2)">1st Innings · '+(mc.batTeam===1?mc.md.t2:mc.md.t1)+'</p><p style="font-size:20px;font-weight:900;color:var(--yellow)" class="mono">'+mc.scores[batTeam===1?2:1].r+'<span style="font-size:14px;color:var(--t3)">/'+mc.scores[batTeam===1?2:1].w+'</span></p></div>':'')
  +'</div>';

  // ── CENTER: run buttons
  var runBtns = [0,1,2,3].map(function(n){
    return '<button onclick="mcBall('+n+')" style="height:88px;border-radius:18px;border:1px solid var(--sep);background:var(--bg2);color:#fff;font-size:42px;font-weight:900;cursor:pointer;transition:transform .08s,filter .1s;-webkit-tap-highlight-color:transparent" onmouseover="this.style.filter=\'brightness(1.2)\'" onmouseout="this.style.filter=\'none\'" ontouchstart="this.style.transform=\'scale(.9)\'" ontouchend="this.style.transform=\'\'">'+n+'</button>';
  }).join('');

  var center = '<div class="dt-keypad">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'
      +'<p class="lbl">Scoring Pad</p>'
      +'<button onclick="mcUndo()" style="display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:9px;border:1px solid var(--sep);background:var(--bg2);color:var(--t2);font-size:12px;font-weight:700;cursor:pointer" onmouseover="this.style.color=\'#fff\'" onmouseout="this.style.color=\'var(--t2)\'">↩ Undo</button>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px">'+runBtns+'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">'
      +'<button onclick="mcBall(4)" style="height:80px;border-radius:18px;border:none;background:linear-gradient(145deg,#082060,#0A84FF);color:#fff;font-size:38px;font-weight:900;cursor:pointer;transition:filter .1s" onmouseover="this.style.filter=\'brightness(1.15)\'" onmouseout="this.style.filter=\'none\'">4</button>'
      +'<button onclick="mcBall(6)" style="height:80px;border-radius:18px;border:none;background:linear-gradient(145deg,#043020,#30D158);color:#fff;font-size:38px;font-weight:900;cursor:pointer;transition:filter .1s" onmouseover="this.style.filter=\'brightness(1.15)\'" onmouseout="this.style.filter=\'none\'">6</button>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px">'
      +'<button onclick="openExtrasPopup()" style="height:56px;border-radius:14px;border:1px solid rgba(255,214,10,.3);background:rgba(255,214,10,.1);color:var(--yellow);font-size:13px;font-weight:700;cursor:pointer;transition:filter .1s" onmouseover="this.style.filter=\'brightness(1.2)\'" onmouseout="this.style.filter=\'none\'">Extra</button>'
      +'<button onclick="openWktPopup()" style="height:56px;border-radius:14px;border:1px solid rgba(255,59,48,.3);background:rgba(255,59,48,.1);color:var(--red);font-size:13px;font-weight:700;cursor:pointer;transition:filter .1s" onmouseover="this.style.filter=\'brightness(1.2)\'" onmouseout="this.style.filter=\'none\'">Wicket</button>'
      +'<button onclick="S.mc.popup={type:\'end_inn\',step:1,data:{}};render()" style="height:56px;border-radius:14px;border:1px solid var(--sep);background:var(--bg2);color:var(--t2);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s" onmouseover="this.style.color=\'#fff\'" onmouseout="this.style.color=\'var(--t2)\'">'+(mc.inn===1?'End Inn':'End Match')+'</button>'
    +'</div>'
    +'<datalist id="sq">'+S.players.map(function(p){return '<option value="'+p.name+'">';}).join('')+'</datalist>'
    // Wicket modal / popup
    +popupHTML()
    +(src.wModal?'<div class="overlay"><div class="panel a-sheet" style="max-width:480px;border-radius:22px"><div class="s-grab-wrap" style="display:none"></div><div style="padding:24px"><div style="text-align:center;margin-bottom:20px"><div style="font-size:52px">🏏</div><p style="color:var(--t2);font-size:15px;margin-top:8px">'+(isSOMode?'Super Over — ':'')+'Who\'s batting next?</p></div><div class="field"><span class="flbl">Next Batter</span><input class="inp" id="lnb" list="sq" placeholder="Player name" value="'+(src.nextBat||'')+'"></div><button onclick="'+(isSOMode?'soConfWkt':'mcConfWkt')+'()" class="btn b-red">Confirm</button></div></div></div>':'')
    +(mc.phase==='completed'?chaseCompleteHTML():'')
    +(mc.phase==='tied'?tiePopupHTML():'')
    +(mc.result&&mc.phase==='result'?resultPopupHTML():'')
  +'</div>';

  // ── RIGHT: ball history + stats
  var histBalls = (mc.ballHistory||[]).slice(-8);
  var ballPills = histBalls.map(function(b){
    var c2=ballColor(b),l=ballLabel(b);
    return '<span style="display:inline-flex;align-items:center;justify-content:center;min-width:38px;height:38px;border-radius:10px;font-size:13px;font-weight:900;background:'+c2.bg+';border:1px solid '+c2.border+';color:'+c2.txt+'">'+l+'</span>';
  }).join('');

  var right = '<div class="dt-sidebar-panel">'
    +'<p class="lbl" style="margin-bottom:12px">This Over</p>'
    +'<div style="display:flex;flex-wrap:wrap;gap:6px;min-height:38px;margin-bottom:16px">'
      +(ballPills||'<span style="color:var(--t3);font-size:12px">No balls yet</span>')
    +'</div>'
    +'<div style="border-top:1px solid var(--sep);padding-top:14px;margin-bottom:14px">'
      +'<p class="lbl" style="margin-bottom:10px">Match Stats</p>'
      +'<div style="display:flex;flex-direction:column;gap:8px">'
        +[
          {l:'Run Rate', v:cs.b>=6?crr||'—':'—', c:'var(--green)'},
          {l:'Req Rate', v:rrr||'—', c:'var(--yellow)'},
          {l:'Extras',   v:extrasTotal, c:'var(--teal)'},
          {l:'Wickets',  v:cs.w+'/10', c:'var(--red)'},
        ].map(function(s){
          return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg2);border-radius:10px">'
            +'<span style="font-size:12px;color:var(--t2);font-weight:600">'+s.l+'</span>'
            +'<span style="font-size:16px;font-weight:800;color:'+s.c+'" class="mono">'+s.v+'</span>'
          +'</div>';
        }).join('')
      +'</div>'
    +'</div>'
    // Extras breakdown
    +(extrasTotal>0?'<div style="border-top:1px solid var(--sep);padding-top:14px">'
      +'<p class="lbl" style="margin-bottom:8px">Extras Breakdown</p>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">'
        +[{l:'Wide',v:ex.wd||0},{l:'No Ball',v:ex.nb||0},{l:'Bye',v:ex.bye||0},{l:'Leg Bye',v:ex.lb||0}].map(function(e){
          return '<div style="background:var(--bg2);border-radius:8px;padding:8px 10px;display:flex;justify-content:space-between"><span style="font-size:11px;color:var(--t3)">'+e.l+'</span><span style="font-size:13px;font-weight:700" class="mono">'+e.v+'</span></div>';
        }).join('')
      +'</div>'
    +'</div>':'')
  +'</div>';

  // Build 3-col grid
  return '<div style="padding:28px 32px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">'
      +'<div><p style="font-size:12px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.06em">'+(isSOMode?'⚡ Super Over':'Live Match')+'</p><h2 style="font-size:22px;font-weight:800">'+mc.md.name+'</h2></div>'
      +'<div style="display:flex;gap:10px">'
        +(isSOMode?'<div class="so-badge">'+IC.flash+' SO '+mc.so.inn+'/2</div>':'<div class="lbadge"><span class="ldot"></span>Live</div>')
      +'</div>'
    +'</div>'
    +'<div id="dt-scoring-grid" class="dt-grid-3'+(DT.focusMode?' dt-focus':'')+'">'
      +'<div class="dt-col dt-col-left">'+left+'</div>'
      +'<div class="dt-col">'+center+'</div>'
      +'<div class="dt-col dt-col-right">'+right+'</div>'
    +'</div>'
  +'</div>';
}

/* ── Desktop Reports ───────────────────────────── */
function dtReportsContent(){
  // Use the existing reportsHTML but wrap in 2-col grid
  return '<div class="dt-reports-grid">'+reportsHTML().replace(/min-height:100dvh;background:var\(--bg\);/g,'')+'</div>';
}

/* ── Desktop Team Hub ──────────────────────────── */
function dtTeamContent(){
  return teamHTML();
}


// ═══════════════════════════════════════════════════
// CONNECTIVITY & BOOT
// ═══════════════════════════════════════════════════
// Re-render on resize crossing mobile/desktop boundary
var _lastDT = DT.isDesktop();
window.addEventListener('resize', function(){
  var nowDT = DT.isDesktop();
  if(nowDT !== _lastDT){ _lastDT = nowDT; render(); }
});
window.addEventListener('online',()=>{S.online=true;fetchData();render();});
window.addEventListener('offline',()=>{S.online=false;render();});
if(S.players.length)S.mc.form.player=S.players[0].name;
handleURLParams();
render();
fetchData();
</script>
</body>
